<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Motif Painter | PatternRipple</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #111; color: #e2e8f0; font-family: sans-serif; user-select: none; }
        .slider-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: #94a3b8; margin-bottom: 4px; }
        input[type="range"] { width: 100%; height: 6px; border-radius: 3px; accent-color: #22c55e; }
        .canvas-bg {
            background-color: #aaaaaa;
            background-image:
                linear-gradient(45deg, #888 25%, transparent 25%),
                linear-gradient(-45deg, #888 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #888 75%),
                linear-gradient(-45deg, transparent 75%, #888 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        canvas { display: block; cursor: crosshair; touch-action: none; }
        .tool-btn {
            padding: 7px 10px; border-radius: 6px; font-size: 11px; font-weight: bold;
            text-transform: uppercase; cursor: pointer; border: 1px solid #475569;
            background: #1e293b; color: #94a3b8; transition: all 0.15s;
            width: 100%; text-align: left; letter-spacing: 0.03em;
        }
        .tool-btn.active { background: #22c55e; color: #000; border-color: #22c55e; }
        .tool-btn:hover:not(.active) { background: #334155; color: #e2e8f0; }
        .swatch {
            width: 100%; aspect-ratio: 1; border-radius: 3px; border: 1px solid #475569;
            cursor: pointer; transition: transform 0.1s;
        }
        .swatch:hover { transform: scale(1.2); border-color: #94a3b8; }
        .section-label { text-xs font-bold uppercase text-slate-400 mt-3 mb-1.5; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

<aside class="w-80 bg-slate-900 border-r border-slate-700 p-5 overflow-y-auto flex flex-col gap-4">
    <div>
        <h1 class="text-green-500 font-bold text-xl tracking-tight">MOTIF PAINTER</h1>
        <p class="text-xs text-slate-500">Transparent Background Export</p>
    </div>

    <!-- Color -->
    <div class="bg-slate-800 p-4 rounded-lg border border-slate-700 space-y-3">
        <label class="block text-xs font-bold uppercase">Color</label>
        <input type="color" id="colorPicker" value="#000000" class="w-full h-16 rounded cursor-pointer border-2 border-slate-600 hover:border-slate-400">
        <div class="flex gap-2 items-center">
            <input type="text" id="colorHex" value="#000000" maxlength="7"
                   class="flex-1 bg-slate-900 border border-slate-700 rounded px-2 py-1.5 text-xs text-slate-200 font-mono">
            <div id="colorPreview" class="w-12 h-12 rounded border-2 border-slate-600 flex-shrink-0"
                 style="background:#000"></div>
        </div>
        <div class="grid grid-cols-8 gap-1" id="palette"></div>
    </div>

    <!-- Size -->
    <div>
        <div class="slider-label"><span>Brush Size</span><span id="v-size">12px</span></div>
        <input type="range" id="brushSize" min="1" max="80" value="12">
    </div>

    <!-- Opacity -->
    <div>
        <div class="slider-label"><span>Opacity</span><span id="v-opacity">100%</span></div>
        <input type="range" id="brushOpacity" min="5" max="100" value="100">
    </div>

    <!-- Stroke Width -->
    <div>
        <div class="slider-label"><span>Stroke Width</span><span id="v-stroke">2px</span></div>
        <input type="range" id="strokeWidth" min="1" max="20" value="2">
    </div>

    <!-- Font Size (for text tool) -->
    <div>
        <div class="slider-label"><span>Font Size</span><span id="v-font">24px</span></div>
        <input type="range" id="fontSize" min="8" max="120" value="24">
    </div>

    <!-- Brush Tools -->
    <div class="space-y-1.5">
        <label class="section-label">Brush Tools</label>
        <button class="tool-btn active" data-tool="brush" data-mode="round">● Round</button>
        <button class="tool-btn" data-tool="brush" data-mode="square">■ Square</button>
        <button class="tool-btn" data-tool="brush" data-mode="marker">▬ Marker</button>
        <button class="tool-btn" data-tool="brush" data-mode="spray">✦ Spray</button>
        <button class="tool-btn" data-tool="brush" data-mode="eraser">◯ Eraser</button>
    </div>

    <!-- Shape Tools -->
    <div class="space-y-1.5">
        <label class="section-label">Shape Tools</label>
        <button class="tool-btn" data-tool="shape" data-mode="line">/ Line</button>
        <button class="tool-btn" data-tool="shape" data-mode="rectangle">□ Rectangle</button>
        <button class="tool-btn" data-tool="shape" data-mode="triangle">△ Triangle</button>
        <button class="tool-btn" data-tool="shape" data-mode="circle">○ Circle</button>
        <button class="tool-btn" data-tool="shape" data-mode="polygon">◆ Polygon</button>
        <button class="tool-btn" data-tool="shape" data-mode="star">★ Star</button>
    </div>

    <!-- Fill & Text Tools -->
    <div class="space-y-1.5">
        <label class="section-label">Utility Tools</label>
        <button class="tool-btn" data-tool="fill" data-mode="bucket">🪣 Bucket Fill</button>
        <button class="tool-btn" data-tool="text" data-mode="text">A Text</button>
    </div>

    <!-- Canvas size -->
    <div class="bg-slate-800 p-3 rounded-lg border border-slate-700 space-y-2">
        <label class="block text-xs font-bold uppercase">Canvas Size</label>
        <select id="canvasSize" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-xs text-slate-200">
            <option value="512">512 × 512</option>
            <option value="800" selected>800 × 800</option>
            <option value="1024">1024 × 1024</option>
        </select>
        <button id="resizeBtn" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-1.5 rounded text-xs transition-all">
            RESIZE
        </button>
    </div>

    <!-- Actions -->
    <div class="mt-auto space-y-2">
        <button id="undoBtn" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-2 rounded-lg text-sm transition-all">
            ↩ UNDO &nbsp;<span class="text-slate-400 text-xs font-normal">Ctrl+Z</span>
        </button>
        <button id="clearBtn" class="w-full bg-slate-700 hover:bg-red-900/60 border border-slate-600 text-white font-bold py-2 rounded-lg text-sm transition-all">
            CLEAR CANVAS
        </button>
        <button id="downloadBtn" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-lg transition-all shadow-lg shadow-green-900/20">
            DOWNLOAD PNG
        </button>
        <p class="text-[10px] text-center text-slate-500">Transparent background</p>
    </div>
</aside>

<main class="flex-1 flex items-center justify-center bg-slate-950 overflow-hidden" id="mainArea">
    <div class="canvas-bg rounded shadow-2xl overflow-hidden" id="canvasWrap">
        <canvas id="canvas"></canvas>
    </div>
</main>

<script>
    const canvas   = document.getElementById('canvas');
    const ctx      = canvas.getContext('2d', { willReadFrequently: true });
    const mainArea = document.getElementById('mainArea');

    function setCanvasSize(px) {
        const pad = 48;
        const maxFit = Math.min(mainArea.clientWidth - pad, mainArea.clientHeight - pad);
        const size   = Math.min(px, maxFit);
        canvas.width  = px;
        canvas.height = px;
        canvas.style.width  = size + 'px';
        canvas.style.height = size + 'px';
    }
    setCanvasSize(800);

    document.getElementById('resizeBtn').addEventListener('click', () => {
        if (!confirm('Resize will clear the canvas. Continue?')) return;
        undoStack.length = 0;
        setCanvasSize(+document.getElementById('canvasSize').value);
    });

    // ── State ─────────────────────────────────────────────────────────────────
    let currentTool     = 'brush';
    let currentMode     = 'round';
    let currentColor    = '#000000';
    let brushSize       = 12;
    let brushOpacity    = 1.0;
    let strokeWidth     = 2;
    let fontSize        = 24;
    let painting        = false;
    let shapeStartX     = 0;
    let shapeStartY     = 0;
    let lastX           = 0, lastY = 0;
    let savedCanvas     = null;

    // ── Undo ───────────────────────────────────────────────────────────────────
    const undoStack = [];
    function saveUndo() {
        undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
        if (undoStack.length > 30) undoStack.shift();
    }
    function undo() {
        if (undoStack.length) ctx.putImageData(undoStack.pop(), 0, 0);
    }
    document.getElementById('undoBtn').addEventListener('click', undo);
    document.addEventListener('keydown', e => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
    });

    // ── Palette ────────────────────────────────────────────────────────────────
    const PALETTE = [
        '#000000','#2d2d2d','#666666','#b0b0b0',
        '#ffffff','#ff0000','#ff6600','#ffcc00',
        '#00bb33','#0066ff','#9900cc','#ff66cc',
        '#00cccc','#ff9966','#5c3317','#336699',
    ];
    const paletteEl = document.getElementById('palette');
    PALETTE.forEach(c => {
        const b = document.createElement('button');
        b.className = 'swatch';
        b.style.background = c;
        b.title = c;
        b.addEventListener('click', () => setColor(c));
        paletteEl.appendChild(b);
    });

    function setColor(c) {
        currentColor = c;
        document.getElementById('colorPicker').value = c;
        document.getElementById('colorHex').value = c;
        document.getElementById('colorPreview').style.background = c;
    }
    document.getElementById('colorPicker').addEventListener('input', e => setColor(e.target.value));
    document.getElementById('colorHex').addEventListener('input', e => {
        if (/^#[0-9a-fA-F]{6}$/.test(e.target.value)) setColor(e.target.value);
    });

    // ── Sliders ────────────────────────────────────────────────────────────────
    document.getElementById('brushSize').addEventListener('input', e => {
        brushSize = +e.target.value;
        document.getElementById('v-size').textContent = brushSize + 'px';
    });
    document.getElementById('brushOpacity').addEventListener('input', e => {
        brushOpacity = +e.target.value / 100;
        document.getElementById('v-opacity').textContent = e.target.value + '%';
    });
    document.getElementById('strokeWidth').addEventListener('input', e => {
        strokeWidth = +e.target.value;
        document.getElementById('v-stroke').textContent = strokeWidth + 'px';
    });
    document.getElementById('fontSize').addEventListener('input', e => {
        fontSize = +e.target.value;
        document.getElementById('v-font').textContent = fontSize + 'px';
    });

    // ── Tool buttons ───────────────────────────────────────────────────────────
    document.querySelectorAll('[data-tool]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTool = btn.dataset.tool;
            currentMode = btn.dataset.mode;
        });
    });

    // ── Drawing utilities ──────────────────────────────────────────────────────
    function getPos(e) {
        const r  = canvas.getBoundingClientRect();
        const sx = canvas.width  / r.width;
        const sy = canvas.height / r.height;
        const src = e.touches ? e.touches[0] : e;
        return { x: (src.clientX - r.left) * sx, y: (src.clientY - r.top) * sy };
    }

    function drawBrushStroke(x, y, px, py) {
        ctx.save();
        ctx.globalAlpha = brushOpacity;

        if (currentMode === 'eraser') {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, brushSize, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,1)';
            ctx.fill();
            ctx.restore();
            return;
        }

        switch (currentMode) {
            case 'round':
                ctx.strokeStyle = currentColor;
                ctx.lineWidth   = brushSize * 2;
                ctx.lineCap     = 'round';
                ctx.lineJoin    = 'round';
                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(x, y);
                ctx.stroke();
                break;
            case 'square':
                ctx.fillStyle = currentColor;
                const s = brushSize * 2;
                ctx.fillRect(Math.round(x - brushSize), Math.round(y - brushSize), s, s);
                break;
            case 'marker':
                ctx.strokeStyle = currentColor;
                ctx.lineWidth   = brushSize * 3.5;
                ctx.lineCap     = 'butt';
                ctx.lineJoin    = 'round';
                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(x, y);
                ctx.stroke();
                break;
            case 'spray':
                ctx.fillStyle = currentColor;
                const radius = brushSize * 2.5;
                const count  = Math.max(12, brushSize * 3);
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const r     = radius * Math.sqrt(Math.random());
                    ctx.beginPath();
                    ctx.arc(x + r * Math.cos(angle), y + r * Math.sin(angle), 0.8, 0, Math.PI * 2);
                    ctx.fill();
                }
                break;
        }
        ctx.restore();
    }

    function drawShape(x, y, x0, y0) {
        ctx.save();
        ctx.globalAlpha = brushOpacity;
        ctx.strokeStyle = currentColor;
        ctx.fillStyle = currentColor;
        ctx.lineWidth = strokeWidth;

        switch (currentMode) {
            case 'line':
                ctx.beginPath();
                ctx.moveTo(x0, y0);
                ctx.lineTo(x, y);
                ctx.stroke();
                break;
            case 'rectangle':
                const w = x - x0, h = y - y0;
                ctx.strokeRect(x0, y0, w, h);
                break;
            case 'triangle':
                const cx = (x0 + x) / 2, cy = (y0 + y) / 2;
                const dx = Math.abs(x - x0), dy = Math.abs(y - y0);
                ctx.beginPath();
                ctx.moveTo(cx, y0);
                ctx.lineTo(x, y);
                ctx.lineTo(x0, y);
                ctx.closePath();
                ctx.stroke();
                break;
            case 'circle':
                const rx = Math.abs(x - x0), ry = Math.abs(y - y0);
                const cex = (x0 + x) / 2, cey = (y0 + y) / 2;
                ctx.beginPath();
                ctx.ellipse(cex, cey, rx, ry, 0, 0, Math.PI * 2);
                ctx.stroke();
                break;
            case 'polygon':
                const sz = Math.sqrt((x - x0) ** 2 + (y - y0) ** 2);
                const sides = 6;
                ctx.beginPath();
                for (let i = 0; i < sides; i++) {
                    const angle = (i / sides) * Math.PI * 2;
                    const px = (x0 + x) / 2 + sz * Math.cos(angle);
                    const py = (y0 + y) / 2 + sz * Math.sin(angle);
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.stroke();
                break;
            case 'star':
                const starSize = Math.sqrt((x - x0) ** 2 + (y - y0) ** 2);
                const centerX = (x0 + x) / 2, centerY = (y0 + y) / 2;
                ctx.beginPath();
                for (let i = 0; i < 10; i++) {
                    const angle = (i / 10) * Math.PI * 2 - Math.PI / 2;
                    const r = i % 2 === 0 ? starSize : starSize * 0.4;
                    const px = centerX + r * Math.cos(angle);
                    const py = centerY + r * Math.sin(angle);
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.stroke();
                break;
        }
        ctx.restore();
    }

    // ── Bucket fill ────────────────────────────────────────────────────────────
    function bucketFill(startX, startY) {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        const w = canvas.width, h = canvas.height;

        const targetColor = ctx.getImageData(startX, startY, 1, 1).data;
        const fillColor = hexToRgba(currentColor);

        const stack = [[Math.round(startX), Math.round(startY)]];
        const visited = new Set();

        function colorsMatch(c1, c2) {
            return c1[0] === c2[0] && c1[1] === c2[1] && c1[2] === c2[2] && c1[3] === c2[3];
        }

        while (stack.length) {
            const [x, y] = stack.pop();
            if (x < 0 || x >= w || y < 0 || y >= h) continue;
            const key = `${x},${y}`;
            if (visited.has(key)) continue;
            visited.add(key);

            const idx = (y * w + x) * 4;
            const pixelColor = [data[idx], data[idx+1], data[idx+2], data[idx+3]];

            if (!colorsMatch(pixelColor, targetColor)) continue;

            data[idx] = fillColor[0];
            data[idx+1] = fillColor[1];
            data[idx+2] = fillColor[2];
            data[idx+3] = Math.round(fillColor[3] * 255);

            stack.push([x+1, y], [x-1, y], [x, y+1], [x, y-1]);
        }

        ctx.putImageData(imageData, 0, 0);
    }

    function hexToRgba(hex) {
        const r = parseInt(hex.slice(1,3),16);
        const g = parseInt(hex.slice(3,5),16);
        const b = parseInt(hex.slice(5,7),16);
        return [r, g, b, brushOpacity];
    }

    // ── Text tool ──────────────────────────────────────────────────────────────
    function drawText(x, y, text) {
        ctx.save();
        ctx.globalAlpha = brushOpacity;
        ctx.fillStyle = currentColor;
        ctx.font = `bold ${fontSize}px sans-serif`;
        ctx.textBaseline = 'top';
        ctx.fillText(text, x, y);
        ctx.restore();
    }

    // ── Mouse events ───────────────────────────────────────────────────────────
    canvas.addEventListener('mousedown', e => {
        saveUndo();
        painting = true;
        const p = getPos(e);
        lastX = p.x; lastY = p.y;
        shapeStartX = p.x; shapeStartY = p.y;

        if (currentTool === 'brush') {
            drawBrushStroke(p.x, p.y, p.x, p.y);
        } else if (currentTool === 'shape') {
            savedCanvas = ctx.getImageData(0, 0, canvas.width, canvas.height);
        } else if (currentTool === 'fill') {
            bucketFill(p.x, p.y);
            painting = false;
        } else if (currentTool === 'text') {
            const text = prompt('Enter text:', '');
            if (text) drawText(p.x, p.y, text);
            painting = false;
        }
    });

    canvas.addEventListener('mousemove', e => {
        if (!painting) return;
        const p = getPos(e);

        if (currentTool === 'brush') {
            drawBrushStroke(p.x, p.y, lastX, lastY);
            lastX = p.x; lastY = p.y;
        } else if (currentTool === 'shape') {
            ctx.putImageData(savedCanvas, 0, 0);
            drawShape(p.x, p.y, shapeStartX, shapeStartY);
        }
    });

    canvas.addEventListener('mouseup', () => painting = false);
    canvas.addEventListener('mouseleave', () => painting = false);

    // ── Touch events ───────────────────────────────────────────────────────────
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        saveUndo();
        painting = true;
        const p = getPos(e);
        lastX = p.x; lastY = p.y;
        shapeStartX = p.x; shapeStartY = p.y;
        if (currentTool === 'brush') {
            drawBrushStroke(p.x, p.y, p.x, p.y);
        } else if (currentTool === 'shape') {
            savedCanvas = ctx.getImageData(0, 0, canvas.width, canvas.height);
        }
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        if (!painting) return;
        const p = getPos(e);
        if (currentTool === 'brush') {
            drawBrushStroke(p.x, p.y, lastX, lastY);
            lastX = p.x; lastY = p.y;
        } else if (currentTool === 'shape') {
            ctx.putImageData(savedCanvas, 0, 0);
            drawShape(p.x, p.y, shapeStartX, shapeStartY);
        }
    }, { passive: false });

    canvas.addEventListener('touchend', () => painting = false);

    // ── Buttons ────────────────────────────────────────────────────────────────
    document.getElementById('clearBtn').addEventListener('click', () => {
        saveUndo();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = 'motif.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
</script>
</body>
</html>
