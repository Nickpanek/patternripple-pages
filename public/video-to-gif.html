            <!-- Convert Button -->

            <!-- Download Section (hidden until conversion complete) -->

    <script type="module">
        import { FFmpeg } from '@ffmpeg/ffmpeg';
        import { fetchFile, toBlobURL } from '@ffmpeg/util';

        const videoInput = document.getElementById('videoInput');
        const dropZone = document.getElementById('dropZone');
        const editorArea = document.getElementById('editorArea');
        const videoPreview = document.getElementById('videoPreview');
        const convertBtn = document.getElementById('convertBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const convertAnotherBtn = document.getElementById('convertAnotherBtn');
        const gifPreview = document.getElementById('gifPreview');
        const downloadSection = document.getElementById('downloadSection');
        const progressSection = document.getElementById('progressSection');
        const uploadError = document.getElementById('uploadError');
        const conversionError = document.getElementById('conversionError');
        const statusMessage = document.getElementById('statusMessage');

        const widthSelect = document.getElementById('widthSelect');
        const fpsSlider = document.getElementById('fpsSlider');
        const fpsValue = document.getElementById('fpsValue');
        const speedSelect = document.getElementById('speedSelect');
        const maxSizeSelect = document.getElementById('maxSizeSelect');
        const trimStart = document.getElementById('trimStart');
        const trimEnd = document.getElementById('trimEnd');

        let ffmpeg = null;
        let videoFile = null;
        let currentGifBlob = null;

        // Initialize FFmpeg on page load
        async function initFFmpeg() {
            try {
                ffmpeg = new FFmpeg();

                // Detect SharedArrayBuffer support (iOS Safari doesn't support it)
                const supportsSharedArrayBuffer = typeof SharedArrayBuffer !== 'undefined';

                // Set core and WASM URLs based on SharedArrayBuffer support
                const coreURL = supportsSharedArrayBuffer
                    ? '/ffmpeg/mt/ffmpeg-core.js'
                    : '/ffmpeg/ffmpeg-core.js';
                const wasmURL = supportsSharedArrayBuffer
                    ? '/ffmpeg/mt/ffmpeg-core.wasm'
                    : '/ffmpeg/ffmpeg-core.wasm';

                // Set up progress listener
                ffmpeg.on('log', ({ message }) => {
                    // Optionally log ffmpeg messages
                });

                // Load FFmpeg
                await ffmpeg.load({ coreURL, wasmURL });
                console.log('FFmpeg initialized successfully');
                statusMessage.textContent = '';
            } catch (error) {
                console.error('FFmpeg initialization failed:', error);
                showError(uploadError, `Failed to load FFmpeg: ${error.message}. Please refresh the page.`);
            }
        }

        // Update FPS display
        fpsSlider.addEventListener('input', () => {
            fpsValue.textContent = fpsSlider.value;
        });

        // File input handling
        videoInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                handleVideoFile(e.target.files[0]);
            }
        });

        // Drag and drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files[0]) {
                handleVideoFile(e.dataTransfer.files[0]);
            }
        });

        function handleVideoFile(file) {
            // Validate file type
            if (!file.type.startsWith('video/')) {
                showError(uploadError, 'Please select a valid video file (MP4, WebM, etc.)');
                return;
            }

            videoFile = file;
            clearError(uploadError);
            clearError(conversionError);

            // Display video preview
            const reader = new FileReader();
            reader.onload = (e) => {
                videoPreview.src = e.target.result;
            };
            reader.readAsArrayBuffer(file);

            // Show editor
            editorArea.classList.remove('hidden');
            downloadSection.classList.add('hidden');
            progressSection.classList.add('hidden');
            convertBtn.disabled = false;
        }

        convertBtn.addEventListener('click', async () => {
            if (!videoFile || !ffmpeg) {
                showError(conversionError, 'Video not loaded or FFmpeg not ready');
                return;
            }

            clearError(conversionError);
            convertBtn.disabled = true;
            downloadSection.classList.add('hidden');
            progressSection.classList.remove('hidden');

            try {
                await convertVideoToGif();
            } catch (error) {
                showError(conversionError, `Conversion failed: ${error.message}`);
                progressSection.classList.add('hidden');
            } finally {
                convertBtn.disabled = false;
            }
        });

        async function convertVideoToGif() {
            const fps = parseInt(fpsSlider.value);
            const width = widthSelect.value;
            const speed = parseFloat(speedSelect.value);
            const maxSize = parseInt(maxSizeSelect.value);
            const start = trimStart.value ? parseFloat(trimStart.value) : 0;
            const end = trimEnd.value ? parseFloat(trimEnd.value) : null;

            updateProgress(0, 'Loading video...');
            const startTime = Date.now();

            // Load video into FFmpeg
            await ffmpeg.writeFile('input_video', await fetchFile(videoFile));
            updateProgress(10, 'Analyzing video...');

            // Get video info (probe to get duration and dimensions)
            let inputFile = 'input_video';
            let trimFilter = '';
            let widthFilter = '';
            let speedFilter = '';
            let fps_arg = fps;

            // Build filters
            if (start || end) {
                const trimStart_val = start;
                const trimEnd_val = end ? `${end}` : '';
                trimFilter = `trim=start=${trimStart_val}${end ? `:end=${trimEnd_val}` : ''}`;
            }

            if (width !== 'original') {
                const w = parseInt(width);
                widthFilter = `scale=${w}:-1`;
            }

            // Speed filter: use setpts to speed up the video
            if (speed !== 1) {
                speedFilter = `setpts=${1/speed}*PTS`;
            }

            // Combine filters
            let videoFilters = [trimFilter, speedFilter, widthFilter].filter(f => f).join(',');

            updateProgress(20, 'Creating palette...');

            // First pass: generate palette
            const paletteCmd = [
                '-i', inputFile,
                ...(videoFilters ? ['-vf', videoFilters] : []),
                '-vf', `${videoFilters ? videoFilters + ',' : ''}palettegen=stats_mode=diff`,
                'palette.png'
            ];

            await ffmpeg.exec(...paletteCmd);
            updateProgress(50, 'Encoding GIF...');

            // Second pass: use palette to encode GIF
            let gifCmd = [
                '-i', inputFile,
                '-i', 'palette.png',
                ...(videoFilters ? ['-vf', `${videoFilters},paletteuse=dither=floyd_steinberg`] : ['-vf', 'paletteuse=dither=floyd_steinberg']),
                '-r', fps_arg.toString(),
                'output.gif'
            ];

            await ffmpeg.exec(...gifCmd);
            updateProgress(80, 'Finalizing...');

            // Read output
            let gifData = await ffmpeg.readFile('output.gif');
            let gifBlob = new Blob([gifData], { type: 'image/gif' });
            let gifSizeKB = Math.round(gifBlob.size / 1024);

            // Check size and adjust if needed
            if (maxSize > 0 && gifBlob.size > maxSize * 1024 * 1024) {
                updateProgress(60, 'Output too large, optimizing...');

                let currentFps = fps;
                let currentWidth = width;

                const widthOrder = ['480', '360', '240'];
                let widthIndex = widthOrder.indexOf(currentWidth);

                // Reduce FPS and width to meet size constraint
                while (gifBlob.size > maxSize * 1024 * 1024 && (currentFps > 5 || widthIndex > 0)) {
                    if (currentFps > 5) {
                        currentFps = Math.max(5, currentFps - 2);
                    } else if (widthIndex > 0) {
                        widthIndex--;
                        currentWidth = widthOrder[widthIndex];
                    } else {
                        break;
                    }

                    // Rebuild filters with new parameters
                    videoFilters = [trimFilter, speedFilter].filter(f => f).join(',');
                    if (currentWidth !== 'original') {
                        const w = parseInt(currentWidth);
                        videoFilters += (videoFilters ? ',' : '') + `scale=${w}:-1`;
                    }

                    // Re-encode with new settings
                    await ffmpeg.exec(
                        '-i', inputFile,
                        ...(videoFilters ? ['-vf', videoFilters] : []),
                        '-vf', `${videoFilters ? videoFilters + ',' : ''}palettegen=stats_mode=diff`,
                        'palette2.png'
                    );

                    gifCmd = [
                        '-i', inputFile,
                        '-i', 'palette2.png',
                        ...(videoFilters ? ['-vf', `${videoFilters},paletteuse=dither=floyd_steinberg`] : ['-vf', 'paletteuse=dither=floyd_steinberg']),
                        '-r', currentFps.toString(),
                        'output2.gif'
                    ];

                    await ffmpeg.exec(...gifCmd);
                    gifData = await ffmpeg.readFile('output2.gif');
                    gifBlob = new Blob([gifData], { type: 'image/gif' });
                }

                gifSizeKB = Math.round(gifBlob.size / 1024);
            }

            // Clean up
            await ffmpeg.deleteFile('input_video');
            await ffmpeg.deleteFile('palette.png');
            await ffmpeg.deleteFile('output.gif');

            updateProgress(100, 'Complete!');

            // Display results
            currentGifBlob = gifBlob;
            const gifUrl = URL.createObjectURL(gifBlob);
            gifPreview.src = gifUrl;

            const finalSize = gifBlob.size > 1024 * 1024
                ? (gifBlob.size / (1024 * 1024)).toFixed(2) + ' MB'
                : gifSizeKB + ' KB';
            document.getElementById('finalSize').textContent = finalSize;

            progressSection.classList.add('hidden');
            downloadSection.classList.remove('hidden');
        }

        downloadBtn.addEventListener('click', () => {
            if (!currentGifBlob) return;

            // Create blob URL and download link
            const gifUrl = URL.createObjectURL(currentGifBlob);
            const a = document.createElement('a');
            a.href = gifUrl;
            a.download = `converted_${Date.now()}.gif`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(gifUrl);
        });

        convertAnotherBtn.addEventListener('click', () => {
            videoFile = null;
            currentGifBlob = null;
            videoInput.value = '';
            videoPreview.src = '';
            editorArea.classList.add('hidden');
            downloadSection.classList.add('hidden');
            progressSection.classList.add('hidden');
            clearError(uploadError);
            clearError(conversionError);
            statusMessage.textContent = '';
        });

        function updateProgress(percent, status) {
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressPercent').textContent = percent + '%';
            document.getElementById('progressStatus').textContent = status;

            // Calculate and display ETA
            const elapsed = Date.now() - progressStartTime;
            if (percent > 0 && percent < 100) {
                const estimatedTotal = (elapsed / percent) * 100;
                const remaining = estimatedTotal - elapsed;
                const remainingSeconds = Math.round(remaining / 1000);
                document.getElementById('elapsedTime').textContent = `Elapsed: ${Math.round(elapsed / 1000)}s`;
                document.getElementById('remainingTime').textContent = `ETA: ${remainingSeconds}s`;
            }
        }

        let progressStartTime = Date.now();

        function showError(element, message) {
            element.textContent = message;
            element.classList.add('show');
        }

        function clearError(element) {
            element.textContent = '';
            element.classList.remove('show');
        }

        // Initialize on load
        window.addEventListener('load', initFFmpeg);
    </script>
