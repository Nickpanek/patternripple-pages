<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Color Blindness Simulator - Test Design Accessibility | PatternRipple</title>
    <meta name="description" content="Preview images as they appear to colorblind users. Simulate protanopia, deuteranopia, tritanopia. Free accessibility testing tool.">
    <meta name="keywords" content="color blindness simulator, color blind test, accessibility tool, protanopia, deuteranopia, design accessibility, inclusive design">
    <link rel="canonical" href="https://www.patternripple.com/color-blindness-simulator.html">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid #333;
            padding-bottom: 30px;
        }
        h1 { font-size: 2rem; font-weight: 300; margin-bottom: 10px; }
        .subtitle { font-size: 14px; color: #888; }
        .upload-panel {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7ee787;
            margin-bottom: 15px;
        }
        .dropzone {
            border: 2px dashed #333;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #0f0f0f;
            margin-bottom: 15px;
        }
        .dropzone:hover, .dropzone.drag-over {
            border-color: #7ee787;
            background: rgba(126, 231, 135, 0.05);
        }
        input[type="file"] { display: none; }
        button {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: #7ee787;
            color: #0a0a0a;
        }
        .btn-primary:hover { background: #6fd874; transform: translateY(-2px); }
        .btn-secondary {
            background: transparent;
            color: #7ee787;
            border: 1px solid #7ee787;
        }
        .btn-secondary:hover { background: #7ee787; color: #0a0a0a; }
        .info-box {
            background: rgba(126, 231, 135, 0.1);
            border: 1px solid #7ee787;
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 15px;
        }
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
            display: none;
        }
        .preview-grid.show { display: grid; }
        .preview-item {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        .preview-item-label {
            font-size: 12px;
            font-weight: 600;
            color: #7ee787;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .preview-item-description {
            font-size: 11px;
            color: #888;
            margin-bottom: 10px;
        }
        .preview-item canvas {
            max-width: 100%;
            height: auto;
            border: 1px solid #333;
            border-radius: 8px;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #333;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Color Blindness Simulator</h1>
            <p class="subtitle">Test design accessibility. Preview images as colorblind users see them.</p>
        </header>

        <div class="upload-panel">
            <label>Upload Image</label>
            <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
                <div style="font-size: 24px; margin-bottom: 10px;">👁️</div>
                <div style="font-weight: 600; margin-bottom: 5px;">Click to upload</div>
                <div style="font-size: 12px; color: #666;">or drag & drop</div>
            </div>
            <input type="file" id="fileInput" accept="image/*">

            <div class="info-box">Test your design with different color vision deficiencies. Helps ensure your work is accessible to 8% of men and 0.5% of women.</div>

            <button class="btn-secondary" onclick="downloadHTML()">Download Tool Offline</button>
        </div>

        <div class="preview-grid" id="previewGrid"></div>

        <footer>
            <p>Created by <a href="https://heylink.me/nickpanek/" style="color: #7ee787; text-decoration: none;">Nick Panek</a></p>
            <button class="btn-secondary" onclick="downloadHTML()" style="font-size: 11px; padding: 8px 16px; width: auto; margin-top: 12px;">Download for Offline Use</button>
        </footer>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const previewGrid = document.getElementById('previewGrid');

        let sourceImage = null;

        // Color blindness transformation matrices
        const transformations = {
            normal: {
                name: 'Normal Vision',
                description: 'Standard color perception',
                matrix: [
                    [1, 0, 0],
                    [0, 1, 0],
                    [0, 0, 1]
                ]
            },
            protanopia: {
                name: 'Protanopia',
                description: 'Red-blind (1% of males)',
                matrix: [
                    [0.567, 0.433, 0],
                    [0.558, 0.442, 0],
                    [0, 0.242, 0.758]
                ]
            },
            deuteranopia: {
                name: 'Deuteranopia',
                description: 'Green-blind (1% of males)',
                matrix: [
                    [0.625, 0.375, 0],
                    [0.7, 0.3, 0],
                    [0, 0.3, 0.7]
                ]
            },
            tritanopia: {
                name: 'Tritanopia',
                description: 'Blue-yellow blind (0.001%)',
                matrix: [
                    [0.95, 0.05, 0],
                    [0, 0.433, 0.567],
                    [0, 0.475, 0.525]
                ]
            }
        };

        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('drag-over');
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('drag-over');
        });

        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('drag-over');
            if (e.dataTransfer.files[0]) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('Please select an image file');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    sourceImage = img;
                    generatePreviews();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function generatePreviews() {
            previewGrid.innerHTML = '';

            Object.entries(transformations).forEach(([key, config]) => {
                const canvas = document.createElement('canvas');
                canvas.width = Math.min(sourceImage.width, 400);
                canvas.height = (canvas.width / sourceImage.width) * sourceImage.height;

                const ctx = canvas.getContext('2d');
                ctx.drawImage(sourceImage, 0, 0, canvas.width, canvas.height);

                applyColorBlindTransform(ctx, canvas.width, canvas.height, config.matrix);

                const item = document.createElement('div');
                item.className = 'preview-item';
                item.innerHTML = `
                    <div class="preview-item-label">${config.name}</div>
                    <div class="preview-item-description">${config.description}</div>
                `;
                item.appendChild(canvas);
                previewGrid.appendChild(item);
            });

            previewGrid.classList.add('show');
        }

        function applyColorBlindTransform(ctx, width, height, matrix) {
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];

                const nr = Math.round(matrix[0][0] * r + matrix[0][1] * g + matrix[0][2] * b);
                const ng = Math.round(matrix[1][0] * r + matrix[1][1] * g + matrix[1][2] * b);
                const nb = Math.round(matrix[2][0] * r + matrix[2][1] * g + matrix[2][2] * b);

                data[i] = Math.min(255, Math.max(0, nr));
                data[i + 1] = Math.min(255, Math.max(0, ng));
                data[i + 2] = Math.min(255, Math.max(0, nb));
            }

            ctx.putImageData(imageData, 0, 0);
        }

        function downloadHTML() {
            const htmlContent = document.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'color-blindness-simulator.html';
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
