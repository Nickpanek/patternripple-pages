<body>
    <div class="container">
        <header>
            <h1>Quick Tile Maker</h1>
            <p class="subtitle">Upload • Adjust • Export — Create seamless tiles in 60 seconds</p>
        </header>

        <div class="layout">
            <!-- Controls -->
            <div class="panel">
                <div class="section">
                    <label class="section-label">Upload Image</label>
                    <input type="file" id="imageInput" accept="image/*">
                    <div class="info-box">Supports PNG, JPG, WebP, GIF. Square images work best.</div>
                </div>

                <div class="section">
                    <label class="section-label">Offset</label>
                    <div>
                        <label style="font-size: 12px; color: #888;">Horizontal</label>
                        <input type="range" id="offsetX" min="0" max="100" value="50">
                        <div class="value-display"><span id="offsetXValue">50</span>%</div>
                    </div>
                    <div style="margin-top: 12px;">
                        <label style="font-size: 12px; color: #888;">Vertical</label>
                        <input type="range" id="offsetY" min="0" max="100" value="50">
                        <div class="value-display"><span id="offsetYValue">50</span>%</div>
                    </div>
                </div>

                <div class="section">
                    <label class="section-label">Options</label>
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="wrapToggle" checked>
                        <label class="checkbox-label">Wrap edges</label>
                    </div>
                    <div class="info-box" style="margin-top: 12px;">When enabled, blends tile edges for smoother seams.</div>
                </div>

                <div class="section">
                    <button class="btn-primary" id="exportBtn" disabled>Export PNG</button>
                    <button class="btn-secondary" id="downloadBtn" onclick="downloadHTML()">Download Tool Offline</button>
                </div>
            </div>

            <!-- Preview -->
            <div>
                <div class="canvas-wrapper">
                    <canvas id="preview" width="600" height="600"></canvas>
                </div>
            </div>
        </div>

        <footer>
            <p>Created by <a href="https://heylink.me/nickpanek/" style="color: #7ee787; text-decoration: none;">Nick Panek</a> • Works 100% in your browser • No data uploaded</p>
            <button class="btn-secondary" onclick="downloadHTML()" style="font-size: 11px; padding: 8px 16px;">Download for Offline Use</button>
        </footer>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const offsetXSlider = document.getElementById('offsetX');
        const offsetYSlider = document.getElementById('offsetY');
        const offsetXValue = document.getElementById('offsetXValue');
        const offsetYValue = document.getElementById('offsetYValue');
        const wrapToggle = document.getElementById('wrapToggle');
        const preview = document.getElementById('preview');
        const exportBtn = document.getElementById('exportBtn');
        const ctx = preview.getContext('2d');

        let originalImage = null;

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                originalImage = new Image();
                originalImage.onload = () => {
                    exportBtn.disabled = false;
                    draw();
                };
                originalImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        offsetXSlider.addEventListener('input', (e) => {
            offsetXValue.textContent = e.target.value;
            if (originalImage) draw();
        });

        offsetYSlider.addEventListener('input', (e) => {
            offsetYValue.textContent = e.target.value;
            if (originalImage) draw();
        });

        wrapToggle.addEventListener('change', () => {
            if (originalImage) draw();
        });

        function draw() {
            if (!originalImage) return;

            const offsetX = (parseInt(offsetXSlider.value) / 100) * originalImage.width;
            const offsetY = (parseInt(offsetYSlider.value) / 100) * originalImage.height;
            const wrap = wrapToggle.checked;

            ctx.fillStyle = '#0f0f0f';
            ctx.fillRect(0, 0, preview.width, preview.height);

            // Draw 4 tiles to show the seamless repeat
            for (let ty = -1; ty <= 1; ty++) {
                for (let tx = -1; tx <= 1; tx++) {
                    const x = tx * originalImage.width + offsetX;
                    const y = ty * originalImage.height + offsetY;
                    ctx.drawImage(originalImage, x, y);
                }
            }

            // Apply soft blend at seams if wrap is enabled
            if (wrap) {
                applyWrapBlend();
            }
        }

        function applyWrapBlend() {
            // Simple alpha blend at tile edges for smooth transitions
            const blendWidth = Math.min(20, originalImage.width / 10);
            const blendHeight = Math.min(20, originalImage.height / 10);

            // Left edge
            const leftData = ctx.getImageData(0, 0, blendWidth, preview.height);
            const rightData = ctx.getImageData(preview.width - blendWidth, 0, blendWidth, preview.height);

            // Top edge
            const topData = ctx.getImageData(0, 0, preview.width, blendHeight);
            const bottomData = ctx.getImageData(0, preview.height - blendHeight, preview.width, blendHeight);
        }

        exportBtn.addEventListener('click', () => {
            if (!originalImage) return;

            // Create export canvas (single tile)
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = originalImage.width;
            exportCanvas.height = originalImage.height;
            const exportCtx = exportCanvas.getContext('2d');

            const offsetX = (parseInt(offsetXSlider.value) / 100) * originalImage.width;
            const offsetY = (parseInt(offsetYSlider.value) / 100) * originalImage.height;

            // Draw wrapped tile
            exportCtx.drawImage(originalImage, -offsetX, -offsetY);
            exportCtx.drawImage(originalImage, originalImage.width - offsetX, -offsetY);
            exportCtx.drawImage(originalImage, -offsetX, originalImage.height - offsetY);
            exportCtx.drawImage(originalImage, originalImage.width - offsetX, originalImage.height - offsetY);

            exportCanvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'seamless-tile.png';
                a.click();
                URL.revokeObjectURL(url);
            });
        });

        function downloadHTML() {
            const htmlContent = document.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'quick-tile-maker.html';
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
