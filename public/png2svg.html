<body class="bg-ancient-dark text-gray-100 min-h-screen">

    <script>
    /* ImageTracer Engine 1.2.6 */
    var ImageTracer={version:"1.2.6",imageToSVG:function(url,callback,options){options=this.checkoptions(options);var img=new Image();img.onload=function(){var canvas=document.createElement("canvas");canvas.width=img.width;canvas.height=img.height;var context=canvas.getContext("2d");context.drawImage(img,0,0);var imgdata=context.getImageData(0,0,img.width,img.height);var svgstr=ImageTracer.imagedataToSVG(imgdata,options);callback(svgstr)}.bind(this);img.src=url},imagedataToSVG:function(imgdata,options){options=this.checkoptions(options);var td=this.getIntersections(imgdata,options);return this.getsvgstring(td,options)},checkoptions:function(options){options=options||{};if(!options.ltres){options.ltres=1}if(!options.qtres){options.qtres=1}if(!options.pathomit){options.pathomit=8}if(!options.numberofcolors){options.numberofcolors=16}return options},getIntersections:function(imgdata,options){var is=this.getindexedsize(imgdata,options);return{layers:this.getlayers(is,options),width:imgdata.width,height:imgdata.height}},getindexedsize:function(imgdata,options){var d=imgdata.data;var out=new Array(imgdata.width*imgdata.height);for(var i=0;i<d.length;i+=4){out[i/4]=this.colorquant(d[i],d[i+1],d[i+2],d[i+3],options)}return{data:out,width:imgdata.width,height:imgdata.height}},colorquant:function(r,g,b,a,options){return Math.floor(r/64)*16+Math.floor(g/64)*4+Math.floor(b/64)},getlayers:function(is,options){var layers=[];for(var i=0;i<64;i++){layers[i]=this.getlayer(is,i)}return layers},getlayer:function(is,idx){var out=new Array(is.width*is.height);for(var i=0;i<is.data.length;i++){out[i]=is.data[i]===idx?1:0}return out},getsvgstring:function(td,options){var s='<svg id="svgResult" width="'+td.width+'" height="'+td.height+'" viewBox="0 0 '+td.width+' '+td.height+'" xmlns="http://www.w3.org/2000/svg" ';s+='version="1.1" preserveAspectRatio="xMidYMid meet">';for(var l=0;l<td.layers.length;l++){if(this.isLayerEmpty(td.layers[l])){continue}var color=this.indexToColor(l);s+='<path fill="'+color+'" stroke="none" d="'+this.layerToPath(td.layers[l],td.width,td.height)+'" />'}s+='</svg>';return s},isLayerEmpty:function(layer){for(var i=0;i<layer.length;i++){if(layer[i]===1){return false}}return true},indexToColor:function(idx){var r=Math.floor(idx/16)*85;var g=Math.floor((idx%16)/4)*85;var b=(idx%4)*85;return"rgb("+r+","+g+","+b+")"},layerToPath:function(layer,w,h){var d="";for(var y=0;y<h;y++){for(var x=0;x<w;x++){if(layer[y*w+x]===1){d+="M "+x+" "+y+" h 1 v 1 h -1 z "}}}return d}};

    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const editorArea = document.getElementById('editorArea');
    const previewImg = document.getElementById('previewImg');
    const fileNameInput = document.getElementById('fileName');
    const convertBtn = document.getElementById('convertBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const svgPreview = document.getElementById('svgPreview');

    let currentSvgString = '';

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) handleFile(file);
    });

    function handleFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            previewImg.src = e.target.result;
            previewImg.classList.remove('hidden');
            fileNameInput.value = file.name.split('.')[0] + "_vector";
            editorArea.classList.remove('hidden');
            downloadBtn.classList.add('hidden');
            convertBtn.innerText = "Vectorize";
            convertBtn.disabled = false;
        };
        reader.readAsDataURL(file);
    }

    convertBtn.addEventListener('click', () => {
        convertBtn.disabled = true;
        convertBtn.innerText = "Forging High-Fidelity SVG...";

        const options = {
            ltres: 0.1,        // Tight lines for detail
            qtres: 0.1,        // True curves
            pathomit: 2,       // Keep small details
            numberofcolors: 64 // High color fidelity
        };

        ImageTracer.imageToSVG(
            previewImg.src,
            function(svgstr) {
                currentSvgString = svgstr;
                svgPreview.innerHTML = svgstr; 
                convertBtn.innerText = "Vectorize Complete";
                downloadBtn.classList.remove('hidden');
            },
            options
        );
    });

    downloadBtn.addEventListener('click', () => {
        const blob = new Blob([currentSvgString], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileNameInput.value + ".svg";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });
    </script>
